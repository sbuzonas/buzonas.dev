name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: TypeScript typecheck
        run: npm run typecheck

      - name: ESLint
        run: npm run lint

      - name: Build (static export)
        run: npm run build

      - name: Lighthouse CI
        run: npx lhci autorun

      - name: Accessibility scan (axe-core)
        run: npx @axe-core/cli ./out --exit

      - name: Dead link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress './out/**/*.html'
